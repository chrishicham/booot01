<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<title>سعر الذهب بالمغرب</title>

<style>
body {
  font-family: Arial;
  text-align: center;
  background: linear-gradient(135deg, #0f2027, #203a43, #2c5364);
  color: white;
  padding: 20px;
}

.card {
  background: rgba(255,255,255,0.1);
  padding: 20px;
  border-radius: 15px;
  margin: 15px 0;
}

input {
  padding: 10px;
  width: 80%;
  border-radius: 10px;
  border: none;
  font-size: 16px;
}

button {
  padding: 10px 20px;
  margin-top: 10px;
  border-radius: 10px;
  border: none;
  font-size: 16px;
  background: gold;
  cursor: pointer;
}

.result {
  margin-top: 15px;
  font-size: 18px;
}
</style>
</head>

<body>

<h1>💰 سعر الذهب اليوم</h1>

<div class="card">
  <h3 id="ounce">جاري التحميل...</h3>
  <h3 id="gram">-</h3>
</div>

<div class="card">
  <h2>💎 الأسعار</h2>
  <p>🔸 24 قيراط : <span id="g24">-</span> درهم</p>
  <p>🔸 21 قيراط : <span id="g21">-</span> درهم</p>
  <p>🔸 18 قيراط : <span id="g18">-</span> درهم</p>
</div>

<div class="card">
  <h2>🧮 احسب السعر</h2>
  <input id="grams" type="number" placeholder="أدخل عدد الغرامات" />
  <button onclick="calculate()">احسب</button>
  <div class="result" id="result"></div>
</div>

<script>
let gramMAD = 0;

// نظام الإعلانات
let calcClicks = 0;
let lastAdTime = 0;

// جلب السعر
async function getGoldPrice() {
  try {
    let goldRes = await fetch("https://api.gold-api.com/price/XAU");
    let goldData = await goldRes.json();
    let ounceUSD = goldData.price;

    let usdRes = await fetch("https://open.er-api.com/v6/latest/USD");
    let usdData = await usdRes.json();
    let usdToMAD = usdData.rates.MAD;

    let ounceMAD = ounceUSD * usdToMAD;
    gramMAD = ounceMAD / 31.1;

    document.getElementById("ounce").innerText =
      "سعر الأونصة: " + ounceMAD.toFixed(2) + " درهم";

    document.getElementById("gram").innerText =
      "سعر الغرام: " + gramMAD.toFixed(2) + " درهم";

    document.getElementById("g24").innerText =
      gramMAD.toFixed(2);

    document.getElementById("g21").innerText =
      (gramMAD * 0.875).toFixed(2);

    document.getElementById("g18").innerText =
      (gramMAD * 0.75).toFixed(2);

  } catch (error) {
    document.getElementById("ounce").innerText =
      "❌ خطأ في تحميل البيانات";
  }
}

// الحساب
function calculate() {
  let grams = document.getElementById("grams").value;

  if (!grams || grams <= 0) {
    document.getElementById("result").innerText = "⚠️ أدخل قيمة صحيحة";
    return;
  }

  if (gramMAD === 0) {
    document.getElementById("result").innerText = "⏳ انتظر تحميل السعر...";
    return;
  }

  let price24 = grams * gramMAD;
  let price21 = grams * gramMAD * 0.875;
  let price18 = grams * gramMAD * 0.75;

  document.getElementById("result").innerHTML =
    "🔸 24 قيراط : " + price24.toFixed(2) + " درهم <br>" +
    "🔸 21 قيراط : " + price21.toFixed(2) + " درهم <br>" +
    "🔸 18 قيراط : " + price18.toFixed(2) + " درهم";

  // عداد الضغطات
  calcClicks++;

  // إعلان بعد كل مرتين
  if (calcClicks >= 2) {
    showSmartAd();
    calcClicks = 0;
  }
}

// إعلان ذكي
function showSmartAd() {
  let now = Date.now();

  // منع التكرار أقل من 30 ثانية
  if (now - lastAdTime < 30000) {
    return;
  }

  lastAdTime = now;

  window.open("https://www.profitablecpmratenetwork.com/q9dp48u2t?key=2c47af4ede0f1094983fdad781055d6f", "_blank");
}

// إعلان تلقائي بعد 20 ثانية
setTimeout(() => {
  showSmartAd();
}, 20000);

// تشغيل
getGoldPrice();
</script>

</body>
</html>
