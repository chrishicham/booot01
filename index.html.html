<!DOCTYPE html>
<html lang="ar" dir="rtl">
  <head>
    <meta charset="UTF-8" />
    <title>Gold Profit App</title>

    <script src="https://telegram.org/js/telegram-web-app.js"></script>

    <style>
      body {
        font-family: Arial;
        background: #0f2027;
        color: white;
        text-align: center;
        padding: 20px;
      }

      .card {
        background: rgba(255, 255, 255, 0.1);
        padding: 15px;
        border-radius: 15px;
        margin: 10px 0;
      }

      button,
      input {
        padding: 10px;
        width: 80%;
        margin: 5px;
        border-radius: 10px;
        border: none;
      }
    </style>
  </head>

  <body>
    <h1>💰 Gold Profit</h1>

    <div class="card">
      <h3 id="userId">User: ...</h3>
      <h3 id="points">Points: 0</h3>
    </div>

    <div class="card">
      <button onclick="watchAd()">🎬 شاهد إعلان واربح</button>
    </div>

    <div class="card">
      <h3>🔗 رابط الإحالة</h3>
      <input id="refLink" readonly />
      <button onclick="copyRef()">نسخ الرابط</button>
    </div>

    <div class="card">
      <h3>👥 الإحالات</h3>
      <p id="refs">0 مستخدم</p>
    </div>

    <script>
      let tg = window.Telegram.WebApp;
      tg.expand();

      // 👤 جلب ID المستخدم
      let user = tg.initDataUnsafe?.user || {};
      let userId = user.id || "guest";

      document.getElementById("userId").innerText = "User: " + userId;

      // 💾 تخزين محلي (محاكاة قاعدة بيانات)
      let points = parseInt(localStorage.getItem("points_" + userId)) || 0;
      let refs = parseInt(localStorage.getItem("refs_" + userId)) || 0;

      document.getElementById("points").innerText = "Points: " + points;
      document.getElementById("refs").innerText = refs + " مستخدم";

      // 🔗 رابط الإحالة
      let refLink = "https://t.me/YOUR_BOT?start=" + userId;
      document.getElementById("refLink").value = refLink;

      // 📋 نسخ الرابط
      function copyRef() {
        navigator.clipboard.writeText(refLink);
        alert("تم النسخ");
      }

      // 🎬 إعلان + نقاط
      let lastAd = 0;

      function watchAd() {
        let now = Date.now();

        if (now - lastAd < 15000) {
          alert("انتظر قليلاً");
          return;
        }

        lastAd = now;

        window.open(
          "https://www.profitablecpmratenetwork.com/q9dp48u2t?key=2c47af4ede0f1094983fdad781055d6f",
          "_blank"
        );

        setTimeout(() => {
          points += 20;
          localStorage.setItem("points_" + userId, points);
          document.getElementById("points").innerText = "Points: " + points;
        }, 5000);
      }

      // 🎯 نظام الإحالة
      function handleReferral() {
        let urlParams = new URLSearchParams(window.location.search);
        let ref = urlParams.get("start");

        if (ref && ref != userId) {
          let already = localStorage.getItem("used_ref");

          if (!already) {
            // مكافأة صاحب الرابط
            let refPoints =
              parseInt(localStorage.getItem("points_" + ref)) || 0;
            refPoints += 50;

            localStorage.setItem("points_" + ref, refPoints);

            // زيادة عدد الإحالات
            let refCount = parseInt(localStorage.getItem("refs_" + ref)) || 0;
            refCount++;

            localStorage.setItem("refs_" + ref, refCount);

            localStorage.setItem("used_ref", "yes");
          }
        }
      }

      handleReferral();
    </script>
  </body>
</html>
