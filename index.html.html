<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<title>سعر الذهب بالمغرب</title>

<!-- سكريبت الإعلان -->
<script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-4483939605247996"
     crossorigin="anonymous"></script>

<script src="https://telegram.org/js/telegram-web-app.js"></script>

<style>
body {
  font-family: Arial;
  text-align: center;
  background: linear-gradient(135deg, #0f2027, #203a43, #2c5364);
  color: white;
  padding: 20px;
}

.card {
  background: rgba(255,255,255,0.1);
  padding: 20px;
  border-radius: 15px;
  margin: 15px 0;
}

input {
  padding: 10px;
  width: 80%;
  border-radius: 10px;
  border: none;
  font-size: 16px;
}

.result {
  margin-top: 15px;
  font-size: 18px;
}
</style>

</head>

<body>

<h1>💰 سعر الذهب اليوم</h1>

<!-- إعلان -->
<div style="margin:15px 0;">
  <ins class="adsbygoogle"
       style="display:block"
       data-ad-format="fluid"
       data-ad-layout-key="-5x+cx+4u-6g+56"
       data-ad-client="ca-pub-4483939605247996"
       data-ad-slot="8536035567"></ins>
</div>

<div class="card">
  <h3 id="ounce">جاري التحميل...</h3>
  <h3 id="gram">-</h3>
</div>

<div class="card">
  <h2>💎 الأسعار</h2>
  
  <p>🔸 24 قيراط : <span id="g24">-</span> درهم</p>
  <p>🔸 18 قيراط : <span id="g18">-</span> درهم</p>
</div>

<div class="card">
  <h2>🧮 احسب السعر</h2>

  <input id="grams" type="number" placeholder="أدخل عدد الغرامات" oninput="calculate()" />

  <div class="result" id="result"></div>
</div>

<script>
let tg = window.Telegram.WebApp;
tg.expand();

let gramMAD = 0;

// جلب السعر
async function getGoldPrice() {
  try {
    let goldRes = await fetch("https://api.gold-api.com/price/XAU");
    let goldData = await goldRes.json();
    let ounceUSD = goldData.price;

    let usdRes = await fetch("https://open.er-api.com/v6/latest/USD");
    let usdData = await usdRes.json();
    let usdToMAD = usdData.rates.MAD;

    let ounceMAD = ounceUSD * usdToMAD;
    gramMAD = ounceMAD / 31.1;

    document.getElementById("ounce").innerText =
      "سعر الأونصة: " + ounceMAD.toFixed(2) + " درهم";

    document.getElementById("gram").innerText =
      "سعر الغرام: " + gramMAD.toFixed(2) + " درهم";

    document.getElementById("g24").innerText =
      gramMAD.toFixed(2);

    document.getElementById("g18").innerText =
      (gramMAD * 0.75).toFixed(2);

  } catch (error) {
    document.getElementById("ounce").innerText =
      "❌ خطأ في تحميل البيانات";
  }
}

// الحساب
function calculate() {
  let grams = document.getElementById("grams").value;

  if (!grams || grams <= 0) {
    document.getElementById("result").innerText = "";
    return;
  }

  if (gramMAD === 0) {
    document.getElementById("result").innerText = "⏳ انتظر تحميل السعر...";
    return;
  }

  let price24 = grams * gramMAD;
  let price18 = grams * gramMAD * 0.75;

  document.getElementById("result").innerHTML =
    "🔸 24 قيراط : " + price24.toFixed(2) + " درهم <br>" +
    "🔸 18 قيراط : " + price18.toFixed(2) + " درهم";
}

// تشغيل التطبيق
getGoldPrice();

// تشغيل الإعلان
(adsbygoogle = window.adsbygoogle || []).push({});
</script>

</body>
</html>
